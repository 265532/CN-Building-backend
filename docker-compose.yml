version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cp_backend
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cp_api
    restart: unless-stopped
    ports:
      - '3333:3333'
    environment:
      - NODE_ENV=production
      - PORT=3333
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - APP_KEY=lQqeyXoV-nUbYp7IaJvzze9ykYGIVnve
      - APP_URL=http://localhost:3333
      - SESSION_DRIVER=cookie
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=cp_backend
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
